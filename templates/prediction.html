
<!DOCTYPE html>
<html>
<head>
<title>Prediction Result</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{
background: linear-gradient(135deg,#4e73df,#1cc88a);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}
.card{border-radius:15px;}
</style>
</head>
<body>
<div class="container">
<div class="row justify-content-center">
<div class="col-md-6">
<div class="card shadow-lg p-4 text-center">

<h2 class="mb-3 text-primary">Loan Prediction Result</h2>


<p><strong>Calculated EMI:</strong> {{ emi }}</p>
<p><strong>EMI / Income Ratio:</strong> {{ ratio }}</p>
<p><strong>Approval Probability:</strong> {{ probability }}%</p>

{% if prediction_text == "Approved" %}
<div class="alert alert-success">Loan Approved</div>
{% else %}
<div class="alert alert-danger">Loan Not Approved</div>
{% endif %}

<a href="/" class="btn btn-outline-primary mt-3">Go Back</a>

</div>
</div>
</div>
</div>
</body>
</html>
