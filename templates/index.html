<!DOCTYPE html>
<html>
<head>
<title>Loan Approval Prediction</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{
background: linear-gradient(135deg,#4e73df,#1cc88a);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}
.card{border-radius:15px;}
</style>
</head>
<body>

<div class="container">
<div class="row justify-content-center">
<div class="col-lg-10">
<div class="card shadow-lg p-4">

<h2 class="text-center text-primary mb-4">Loan Approval Prediction</h2>

<form method="POST" action="/prediction">
<div class="row g-3">

<!-- Name -->
<div class="col-md-6">
<label class="form-label">Name</label>
<input type="text" name="name" class="form-control" required>
</div>

<!-- Gender -->
<div class="col-md-6">
<label class="form-label">Gender</label>
<select name="gender" class="form-select" required>
<option value="">Select</option>
<option>Male</option>
<option>Female</option>
</select>
</div>

<!-- Married -->
<div class="col-md-6">
<label class="form-label">Married</label>
<select name="married" class="form-select" required>
<option value="">Select</option>
<option>Yes</option>
<option>No</option>
</select>
</div>

<!-- Dependents -->
<div class="col-md-6">
<label class="form-label">Dependents</label>
<select name="dependents" class="form-select" required>
<option value="">Select</option>
<option>0</option>
<option>1</option>
<option>2</option>
<option>3+</option>
</select>
</div>

<!-- Education -->
<div class="col-md-6">
<label class="form-label">Education</label>
<select name="education" class="form-select" required>
<option value="">Select</option>
<option>Graduate</option>
<option>Not Graduate</option>
</select>
</div>

<!-- Self Employed -->
<div class="col-md-6">
<label class="form-label">Self Employed</label>
<select name="self_employed" class="form-select" required>
<option value="">Select</option>
<option>Yes</option>
<option>No</option>
</select>
</div>

<!-- Applicant Income -->
<div class="col-md-6">
<label class="form-label">Applicant Income</label>
<input type="number" name="applicant_income" class="form-control" required>
</div>

<!-- Loan Amount -->
<div class="col-md-6">
<label class="form-label">Loan Amount</label>
<input type="number" name="loan_amount" class="form-control" required>
</div>

<!-- Loan Term -->
<div class="col-md-6">
<label class="form-label">Loan Term (Months)</label>
<input type="number" name="loan_term" class="form-control" required>
</div>

<!-- Credit History -->
<div class="col-md-6">
<label class="form-label">Credit History</label>
<select name="credit_history" class="form-select" required>
<option value="">Select</option>
<option value="1.0">1.0 (Good)</option>
<option value="0.0">0.0 (Bad)</option>
</select>
</div>

<!-- Property Area -->
<div class="col-md-6">
<label class="form-label">Property Area</label>
<select name="property_area" class="form-select" required>
<option value="">Select</option>
<option>Urban</option>
<option>Semiurban</option>
<option>Rural</option>
</select>
</div>

<!-- Button -->
<div class="col-12 text-center mt-4">
<button type="submit" class="btn btn-primary px-5 py-2">
Predict
</button>
</div>

</div>
</form>

</div>
</div>
</div>
</div>

</body>
</html>
